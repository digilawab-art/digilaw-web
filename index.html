<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digilaw Sverige AB</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #1a202c;
            margin-top: 0;
            font-size: 2em;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            color: #4a5568;
            margin-bottom: 15px;
        }
        .contact {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            font-size: 1.05em;
        }
        a {
            color: #0070f3;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Digilaw Sverige AB</h1>
        <p>Vi ägnar oss åt medlingsuppdrag och juridisk tvistelösning, bl.a. skiljeuppdrag.</p>
        <p>Vi utvecklar även mjukvara.</p>
        
        <div class="contact" id="secure-contact">
            <noscript>Kontakt: mikael (snabel-a) digilaw.se</noscript>
        </div>
    </div>

    <script>
        // Det här pusslar ihop mejlen för riktiga besökare
        var part1 = "mikael";
        var part2 = "digilaw.se";
        var email = part1 + "@" + part2;
        var contactBox = document.getElementById("secure-contact");
        contactBox.innerHTML = 'Kontakt: <a href="mailto:' + email + '">' + email + '</a>';
    </script>
</body>
</html>
